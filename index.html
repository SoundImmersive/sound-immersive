<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Portfolio Immersif</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#000; color:#fff; }

.hero {
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero video {
  position:absolute;
  width:100%; height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

.hero-content {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
}

.hero h1 {
  font-size:60px;
  letter-spacing:2px;
}

.hero p {
  margin-top:10px;
  opacity:0.8;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
}

.card {
  position:relative;
  height:400px;
  cursor:pointer;
  overflow:hidden;
}

.card img {
  width:100%; height:100%;
  object-fit:cover;
  transition:transform 1s ease;
}

.card:hover img {
  transform:scale(1.1);
}

.card-overlay {
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.card h2 { font-size:22px; }
.card p { font-size:14px; opacity:0.8; }

footer {
  text-align:center;
  padding:40px;
  opacity:0.5;
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <video autoplay muted loop playsinline>
    <source src="videos/hero.mp4" type="video/mp4">
  </video>
  <div class="hero-content">
    <h1>Mon Univers</h1>
    <p>Expériences visuelles & sonores</p>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="card" onclick="location.href='articles/montagne.html'">
    <img src="images/preview-montagne.jpg">
    <div class="card-overlay">
      <h2>Voyage en montagne</h2>
      <p>Immersion naturelle</p>
    </div>
  </div>

  <div class="card" onclick="location.href='articles/film.html'">
    <img src="images/preview-film.jpg">
    <div class="card-overlay">
      <h2>Film immersif</h2>
      <p>Expérience vidéo</p>
    </div>
  </div>

</div>

<footer>
  © Mon Portfolio
</footer>

</body>
</html>
