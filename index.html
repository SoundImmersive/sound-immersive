<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Blog immersif pro</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#000; color:#fff; overflow:hidden; }

    .list {
      position:absolute;
      width:100%;
      height:100vh;
      background:#111;
      padding:40px;
    }

    .article {
      font-size:28px;
      padding:20px;
      border-bottom:1px solid #333;
      cursor:pointer;
      transition:0.3s;
    }

    .article:hover {
      background:#222;
      transform:translateX(10px);
    }

    .viewer {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:#000;
      display:none;
      overflow:hidden;
    }

    .viewer.active { display:block; }

    .slide {
      position:absolute;
      width:100%; height:100%;
      background-size:cover;
      background-position:center;
      opacity:0;
      transition:opacity 1s ease;
    }

    .slide.active { 
      opacity:1; 
      animation: zoom 20s ease-in-out forwards;
    }
      @keyframes zoom {
        00% {
        transform: scale(1) translate(0, 0);
        }
        100% {
        transform: scale(1.15) translate(-2%, -2%);
             }
        }
    .overlay {
      position:absolute;
      bottom:40px;
      left:40px;
      background:rgba(0,0,0,0.4);
      padding:20px;
      border-radius:10px;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size:32px;
      margin-bottom:10px;
    }

    .close {
      position:absolute;
      top:20px;
      right:30px;
      font-size:30px;
      cursor:pointer;
    }

    .nav {
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:40px;
      cursor:pointer;
      padding:20px;
      user-select:none;
    }

    .prev { left:0; }
    .next { right:0; }

    audio { display:none; }
  </style>
</head>
<body>

<div onclick="location.href='articles/montagne.html'">
  Voyage en montagne
</div>

<div onclick="location.href='articles/film.html'">
  Film immersif
</div>
</body>
</html>
