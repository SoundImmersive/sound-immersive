<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eveil de la nature sur les rives de l'Yvette</title>

<!-- Open Graph (preview réseaux) -->
<meta property="og:title" content="Eveil de la nature sur les rives de l'Yvette">
<meta property="og:description" content="Immersion visuelle et sonore">
<meta property="og:image" content="https://tonsite.com/images/preview.jpg">
<meta property="og:type" content="website">

<style>
body { margin:0; background:#000; overflow:hidden; }

.slide {
  position:fixed;
  inset:0;
  z-index: 1;
  background-size: contain;
  background-repeat: no-repeat;
  background-color: black;
  background-position:50% 40%;
  opacity:0;
  transition: opacity 3s ease-in-out;
}

.slide.active {
  opacity:1;
  animation: zoomLoop 20s ease-in-out infinite;
}

@keyframes zoomLoop {
  0% {
    transform: scale(0.95);
  }
  50% {
    transform: scale(1.1) translate(-2%, -2%);
  }
  100% {
    transform: scale(0.95);
  }
}

.overlay {
  position:fixed;
  bottom:40px;
  left:40px;
  color:white;
  background:rgba(0,0,0,0.4);
  padding:20px;
  backdrop-filter: blur(10px);
}

#soundButton {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 12px 18px;
  border-radius: 30px;
  font-size: 14px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  z-index: 10; /* important */
}

#soundButton:hover {
  background: rgba(255,255,255,0.2);
}
  
</style>
</head>
<body>

<div id="slides"></div>
<div class="overlay">
  <h1>Eveil de la nature</h1>
  <p>Fermez les yeux, vous y êtes !</p>
</div>

<audio id="audio" src="../audio/150426-0858-H1e-StRemy-Riviere-bnc-low.wav" loop></audio>

<div id="soundButton">🔊 Activer le son</div>
  
<script>
const btn = document.getElementById("soundButton");
const audio = document.getElementById("audio");

btn.addEventListener("click", () => {
audio.play();
btn.style.opacity = "0";
setTimeout(() => btn.style.display = "none", 300);
});

  const s = [
  "../images/260415-0858-h1e-stremy-yvette.jpg"
];

const container = document.getElementById("slides");

s.forEach((src, i) => {
  const img = new Image();
  img.src = src;

  img.onload = () => {
    const div = document.createElement("div");
    div.className = "slide";

    // Détection portrait vs paysage
    if (img.height > img.width) {
      // 📱 portrait → zoom contrôlé
      div.style.backgroundSize = "cover";
      div.style.backgroundPosition = "50% 30%";
    } else {
      // 🖼️ paysage → affichage propre
      div.style.backgroundSize = "cover";
      div.style.backgroundPosition = "center";
    }

    div.style.backgroundImage = `url(${src})`;

    if (i === 0) div.classList.add("active");

    container.appendChild(div);
  };
});

function next(){
  const slides = document.querySelectorAll(".slide");

  slides[index].classList.remove("active");

  index = (index + 1) % slides.length;

  slides[index].classList.add("active");
}

setInterval(next, 20000);
</script>
  
</body>
</html>
